<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1F4E79"/>
  <g transform="translate(96 96)">
    <!-- Cheque outline -->
    <rect x="0" y="60" width="320" height="200" rx="16" fill="#ffffff" opacity="0.96"/>
    <!-- Cheque header band -->
    <rect x="0" y="60" width="320" height="40" rx="16" fill="#2c6ba8"/>
    <rect x="0" y="84" width="320" height="16" fill="#2c6ba8"/>
    <!-- Cheque title -->
    <text x="20" y="92" font-family="ui-monospace,Menlo,monospace" font-size="20" font-weight="700" fill="#ffffff">SMARTCHEQUE</text>
    <!-- Cheque amount text line -->
    <rect x="20" y="120" width="160" height="10" rx="5" fill="#1F4E79" opacity="0.4"/>
    <!-- Cheque amount box -->
    <rect x="20" y="150" width="180" height="50" rx="8" fill="none" stroke="#1F4E79" stroke-width="3"/>
    <text x="30" y="186" font-family="ui-monospace,Menlo,monospace" font-size="26" font-weight="700" fill="#1F4E79">₹10,000.00</text>
    <!-- MICR line -->
    <text x="20" y="232" font-family="ui-monospace,Menlo,monospace" font-size="12" font-weight="700" fill="#1F4E79" letter-spacing="2">⑆000123456⑊ ⑈400018⑈</text>
    <!-- QR square -->
    <rect x="232" y="148" width="60" height="60" fill="#1F4E79"/>
    <g fill="#ffffff">
      <rect x="238" y="154" width="14" height="14"/>
      <rect x="272" y="154" width="14" height="14"/>
      <rect x="238" y="188" width="14" height="14"/>
      <rect x="256" y="172" width="6" height="6"/>
      <rect x="266" y="182" width="6" height="6"/>
      <rect x="276" y="172" width="6" height="6"/>
      <rect x="246" y="194" width="6" height="6"/>
    </g>
    <!-- Shield overlay bottom-right -->
    <g transform="translate(232 0)">
      <path d="M40 0 L80 16 L80 60 Q80 90 40 110 Q0 90 0 60 L0 16 Z" fill="#F8C400" stroke="#1F4E79" stroke-width="3"/>
      <path d="M22 56 L36 70 L60 42" fill="none" stroke="#1F4E79" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
