version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartcheque_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartcheque}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartcheque123}
      POSTGRES_DB: ${POSTGRES_DB:-smartcheque}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcheque"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcheque_network

  redis:
    image: redis:7-alpine
    container_name: smartcheque_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcheque_network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: smartcheque_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - smartcheque_network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: smartcheque_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - smartcheque_network

  minio:
    image: minio/minio:latest
    container_name: smartcheque_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - smartcheque_network

  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: smartcheque_opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - smartcheque_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartcheque_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_healthy
      opensearch:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smartcheque}:${POSTGRES_PASSWORD:-smartcheque123}@postgres:5432/${POSTGRES_DB:-smartcheque}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-admin123}
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
      BANK_RSA_PRIVATE_KEY_PATH: /run/secrets/bank_rsa_private
      BANK_RSA_PUBLIC_KEY_PATH: /run/secrets/bank_rsa_public
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    secrets:
      - bank_rsa_private
      - bank_rsa_public
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - smartcheque_network

secrets:
  bank_rsa_private:
    file: ./secrets/bank_rsa_private.pem
  bank_rsa_public:
    file: ./secrets/bank_rsa_public.pem

volumes:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data:

networks:
  smartcheque_network:
    driver: bridge